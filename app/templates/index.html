{% extends "base.html" %}

{% block title %}오늘의 할일{% endblock %}

{% block content %}
<div x-data="todoApp()" class="flex flex-col min-h-screen pb-24">
  <!-- 날짜 헤더 -->
  <header class="bg-white px-5 pt-6 pb-4 shadow-sm">
    <h1 class="text-xl font-bold text-gray-900">
      {{ today_str }}
    </h1>
    <p class="text-sm text-gray-500 mt-1">
      {% if todo_count > 0 %}
        오늘 할 일 {{ todo_count }}개
      {% else %}
        오늘 할 일 없음
      {% endif %}
    </p>
  </header>

  <!-- 할일 목록 영역 -->
  <main id="todo-list-container" data-testid="todo-list" class="flex-1 px-5 py-4">
    {% include "partials/todo-list.html" %}
  </main>

  <!-- 할일 추가 폼 (모달) -->
  <div x-show="showForm" x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-full"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-full"
       x-cloak
       class="fixed inset-0 z-50 bg-white overflow-y-auto">
    <div class="max-w-md mx-auto">
      <!-- 상단 바 -->
      <div class="flex items-center justify-between px-5 pt-6 pb-4 border-b border-gray-200">
        <button @click="closeForm()" class="min-w-[44px] min-h-[44px] flex items-center text-gray-600 text-base">
          &larr; 뒤로
        </button>
        <h2 class="text-lg font-bold text-gray-900" x-text="editingId ? '할일 수정' : '할일 추가'"></h2>
        <div class="w-[44px]"></div>
      </div>

      <!-- 폼 영역 -->
      <div id="todo-form-container" class="px-5 py-4">
        {% include "partials/todo-form.html" %}
      </div>
    </div>
  </div>

  <!-- 하단 플로팅 버튼 -->
  <div class="fixed bottom-6 right-6 flex gap-3 z-40" x-show="!showForm">
    <button @click="openForm()"
            data-testid="add-todo-button"
            class="w-14 h-14 bg-blue-500 hover:bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl active:scale-95 transition-transform">
      &#9999;&#65039;
    </button>
    <button @click="startVoiceInput()"
            class="w-14 h-14 bg-green-500 hover:bg-green-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl active:scale-95 transition-transform">
      &#127908;
    </button>
  </div>
</div>

<script>
function todoApp() {
  return {
    showForm: false,
    editingId: null,
    editingData: null,

    openForm(todo = null) {
      if (todo) {
        this.editingId = todo.id;
        this.editingData = todo;
      } else {
        this.editingId = null;
        this.editingData = null;
      }
      this.showForm = true;
      this.$nextTick(() => {
        const titleInput = document.getElementById('form-title');
        if (titleInput) {
          if (this.editingData) {
            titleInput.value = this.editingData.title || '';
            const descInput = document.getElementById('form-description');
            if (descInput) descInput.value = this.editingData.description || '';
            const timeInput = document.getElementById('form-time');
            if (timeInput) timeInput.value = this.editingData.scheduled_time || '';
          } else {
            titleInput.value = '';
            const descInput = document.getElementById('form-description');
            if (descInput) descInput.value = '';
            const timeInput = document.getElementById('form-time');
            if (timeInput) timeInput.value = '';
          }
          titleInput.focus();
        }
      });
    },

    closeForm() {
      this.showForm = false;
      this.editingId = null;
      this.editingData = null;
    },

    startVoiceInput() {
      if (typeof window.VoiceInput !== 'undefined') {
        this.openForm();
        this.$nextTick(() => {
          window.VoiceInput.start();
        });
      } else {
        alert('음성 입력 기능이 준비 중입니다.');
      }
    },

    onFormSuccess() {
      this.closeForm();
    }
  }
}

// HTMX 이벤트: 폼 제출 성공 시 모달 닫기 + 목록 갱신
document.addEventListener('htmx:afterSwap', function(event) {
  if (event.detail.target.id === 'todo-list-container') {
    const app = document.querySelector('[x-data]').__x.$data;
    if (app && app.showForm) {
      app.showForm = false;
      app.editingId = null;
      app.editingData = null;
    }
  }
});
</script>
{% endblock %}
