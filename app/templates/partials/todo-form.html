<form x-ref="todoForm"
      :hx-post="editingId ? undefined : '/partials/todos'"
      :hx-put="editingId ? '/partials/todos/' + editingId : undefined"
      hx-target="#todo-list-container"
      hx-swap="innerHTML transition:true"
      x-data="{ title: '' }"
      @htmx:after-swap.window="if ($event.detail.target.id === 'todo-list-container') { $dispatch('form-success') }"
      class="space-y-5">

  <!-- 제목 입력 (필수) -->
  <div>
    <label for="form-title" class="block text-sm font-medium text-gray-700 mb-1">
      제목 <span class="text-red-500">*</span>
    </label>
    <input type="text"
           id="form-title"
           name="title"
           x-model="title"
           data-testid="todo-title-input"
           placeholder="할일을 입력하세요"
           maxlength="200"
           required
           class="w-full px-4 py-3 text-base border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
    <p x-show="title.length > 180" class="text-xs text-orange-500 mt-1">
      <span x-text="200 - title.length"></span>자 남음
    </p>
  </div>

  <!-- 상세 내용 (선택) -->
  <div>
    <label for="form-description" class="block text-sm font-medium text-gray-700 mb-1">
      상세 내용
    </label>
    <textarea id="form-description"
              name="description"
              rows="3"
              placeholder="추가 메모를 입력하세요"
              class="w-full px-4 py-3 text-base border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none transition-colors"></textarea>
  </div>

  <!-- 예정 시간 (선택) -->
  <div>
    <label for="form-time" class="block text-sm font-medium text-gray-700 mb-1">
      예정 시간
    </label>
    <input type="time"
           id="form-time"
           name="scheduled_time"
           class="w-full px-4 py-3 text-base border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors">
  </div>

  <!-- 음성 입력 버튼 -->
  <div x-data="{ recording: false }" id="voice-input-area">
    <button type="button"
            @click="if (typeof window.VoiceInput !== 'undefined') { window.VoiceInput.start(); recording = true; } else { alert('음성 입력 기능이 준비 중입니다.'); }"
            :class="recording ? 'bg-red-100 border-red-400 text-red-600' : 'bg-gray-50 border-gray-300 text-gray-600'"
            class="w-full px-4 py-3 text-base border rounded-xl flex items-center justify-center gap-2 min-h-[44px] transition-colors">
      <span x-show="!recording">&#127908; 음성으로 입력</span>
      <span x-show="recording" class="flex items-center gap-2">
        <span class="recording-dot"></span>
        녹음 중...
      </span>
    </button>
    <!-- 음성 인식 결과 미리보기 -->
    <div id="voice-preview" class="hidden mt-3 p-3 bg-blue-50 rounded-xl text-sm text-blue-700">
      <p id="voice-preview-text"></p>
    </div>
  </div>

  <!-- 저장 버튼 -->
  <button type="submit"
          data-testid="save-todo-button"
          :disabled="!title.trim()"
          :class="title.trim() ? 'bg-blue-500 hover:bg-blue-600 active:scale-95' : 'bg-gray-300 cursor-not-allowed'"
          class="w-full py-3 text-base font-medium text-white rounded-xl transition-all min-h-[44px]">
    저장하기
  </button>

  <!-- 삭제 버튼 (수정 모드일 때만) -->
  <template x-if="editingId">
    <button type="button"
            data-testid="delete-todo-button"
            @click="if (confirm('정말 삭제하시겠습니까?')) { htmx.ajax('DELETE', '/partials/todos/' + editingId, {target: '#todo-list-container', swap: 'innerHTML transition:true'}); }"
            class="w-full py-3 text-base font-medium text-white bg-red-500 hover:bg-red-600 rounded-xl transition-all min-h-[44px] active:scale-95">
      삭제하기
    </button>
  </template>
</form>
