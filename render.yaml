services:
  - type: web
    name: todo-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://todo-app.onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
